# OpenSpec config for enchufate-V2
#
# Generated by sdd-init on 2026-07-18.
# This file is the source of truth for SDD behavior in this project.
# Edit the `context` block as the stack matures; the `rules` block is
# where project-specific constraints per phase live.

schema: spec-driven

# Project context — keep this under 10 lines.
# Stack values are PLANNED, not yet detected (project is greenfield).
context: |
  Project: enchufate-V2 (P2P EV charger marketplace, Uruguay)
  Runtime: Expo SDK 54 (planned) + React Native + Expo Router 6 (file-based)
  Language: TypeScript (strict mode planned)
  Backend: Supabase (https://qmoomdsaqywltaretbef.supabase.co)
  Architecture: feature-based (`src/features/{auth,chargers,reservations,messages,profile}`)
  Style: atomic design + clean architecture
  Strict TDD: disabled (no test runner configured yet)
  Persistence: hybrid (openspec files + engram)

rules:
  proposal:
    - Include rollback plan for risky changes
    - Reference Supabase migrations as scope items when schema changes are involved
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Spanish UI copy MUST be Rioplatense (voseo); code/comments/identifiers in English
  design:
    - Include sequence diagrams for complex flows
    - Document Supabase RLS + RPC decisions with rationale
    - Never use Reanimated 4 (crashes in Expo Go); use RN Animated or Reanimated 3
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
    - PR budget: 400 lines (default); flag chained-PR candidates
  apply:
    - Follow existing code patterns
    tdd: false
    test_command: ""
    linters: [expo lint, tsc --noEmit]
  verify:
    test_command: ""
    build_command: "expo prebuild --no-install && npx expo export"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
    - When archiving, sync delta specs to openspec/specs/{domain}/spec.md
