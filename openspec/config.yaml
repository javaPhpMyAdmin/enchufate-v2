# OpenSpec config for enchufate-V2
#
# Generated by sdd-init on 2026-07-18; refreshed on 2026-07-19
# after Phases 1–4 of `mvp-bootstrap` were applied.
#
# This file is the source of truth for SDD behavior in this project.
# Edit the `context` block as the stack matures; the `rules` block is
# where project-specific constraints per phase live.

schema: spec-driven

# Project context — keep this under 10 lines.
# Stack values are now DETECTED, not planned. The project has been
# bootstrapped and is mid-MVP: Phases 1–4 (Foundation, Design system,
# Auth, Public tabs) are applied; Phase 5 (Auth-gated tabs) is next.
context: |
  Project: enchufate-V2 (P2P EV charger marketplace, Uruguay)
  Runtime: Expo SDK 54 + RN 0.81 + Expo Router 6 (file-based, typed routes) + React 19.1
  Language: TypeScript strict (`noUncheckedIndexedAccess`, `noImplicitOverride`)
  Backend: Supabase (https://qmoomdsaqywltaretbef.supabase.co) — Postgres + Auth + Realtime + Storage
  Architecture: feature-based (`src/features/{auth,chargers,reservations,messages,profile}`) + atomic design (`src/components/{atoms,molecules,organisms}`)
  Server state: TanStack Query v5 (`@/lib/queryClient`); Client state: Zustand (`@/stores/*`)
  Stage: Phases 1–4 of mvp-bootstrap applied; 61 commits on main; Phase 5 next
  Strict TDD: disabled (no test runner configured; jest in pnpm-lock is transitive from Expo)
  Persistence: hybrid (openspec files + engram)

rules:
  proposal:
    - Include rollback plan for risky changes
    - Reference Supabase migrations as scope items when schema changes are involved
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Spanish UI copy MUST be Rioplatense (voseo); code/comments/identifiers in English
  design:
    - Include sequence diagrams for complex flows
    - Document Supabase RLS + RPC decisions with rationale
    - Never use Reanimated 4 (crashes in Expo Go); use RN Animated or Reanimated 3
    - Design tokens under `src/theme/` are the SOLE source of colors/spacing/radius/typography/shadows. No hex literals elsewhere. Exceptions: `app.json` splash/icon, `app/+not-found.tsx` (pre-Phase 2), and migration SQL.
    - Server state via TanStack Query; client state via Zustand only when truly client-side
    - Pure utilities only in `src/lib/`; no React imports, no Supabase queries, no `process.env` reads outside `src/lib/supabase.ts` and `src/lib/secureStorage.ts`
    - Errors as `AppError`: feature hooks wrap Supabase / network / unknown errors via `normalizeSupabaseError`; UI reads `error.userMessage` and `error.isNetworkError` — never raw `Error.message`
    - Formatters in `@/lib/format` (`formatPrice`, `formatDistance`, `formatDateTime`, `formatRelativeTime`) MUST use `es-UY` locale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
    - PR budget: 400 lines (default); flag chained-PR candidates
    - Save apply-progress to Engram at topic `sdd/{change-name}/apply-phase-{N}` so the next sub-agent can resume
  apply:
    - Follow existing code patterns; prefer established components over new ones
    - Use TanStack Query for server state; Zustand for client state only
    - Wrap Supabase / network errors via `normalizeSupabaseError`; UI reads `error.userMessage`
    - Use `@/lib/format` with `es-UY` locale for all number/date/relative-time rendering
    - Mark tasks `[x]` in `openspec/changes/.../tasks.md` as you go — do not batch
    tdd: false
    test_command: ""
    linters: [expo lint, tsc --noEmit]
  verify:
    test_command: ""
    build_command: "expo prebuild --no-install && npx expo export"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
    - When archiving, sync delta specs to openspec/specs/{domain}/spec.md
